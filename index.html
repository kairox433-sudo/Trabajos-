<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENA 2026 | Feria de Innovación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
/* ========================================================
   VARIABLES Y RESET
   ======================================================== */
:root {
  --bg: #050507;
  --surface: #0c0c10;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --text: #e8e4dc;
  --muted: rgba(232,228,220,0.45);

  --palet-gold: #D4AF37;
  --palet-dark: #1a1508;
  --palet-accent: #f5d76e;

  --bambu-green: #3dba72;
  --bambu-dark: #061409;
  --bambu-accent: #7fe8aa;

  --amaru-rose: #e8738a;
  --amaru-dark: #150810;
  --amaru-accent: #f5aab8;

  --active-color: var(--palet-gold);
  --active-glow: rgba(212,175,55,0.18);
  --active-page: var(--palet-dark);
  --active-accent: var(--palet-accent);
}

*{margin:0;padding:0;box-sizing:border-box;cursor:none;}
html,body{width:100%;height:100%;overflow:hidden;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
  background-image:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 60%);
}

/* ========================================================
   CURSOR MAGNÉTICO
   ======================================================== */
#c-dot{
  position:fixed;width:6px;height:6px;background:#fff;border-radius:50%;
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
  mix-blend-mode:difference;transition:width .15s,height .15s;
}
#c-ring{
  position:fixed;width:36px;height:36px;border:1px solid rgba(255,255,255,0.3);
  border-radius:50%;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:width .3s,height .3s,border-color .3s,background .3s;
}
body:has(*:hover) #c-ring{}

#ambient{
  position:fixed;width:60vw;height:60vw;border-radius:50%;
  background:radial-gradient(circle,var(--active-glow) 0%,transparent 65%);
  pointer-events:none;z-index:0;transform:translate(-50%,-50%);
  transition:background 1s;
}

/* ========================================================
   PARTÍCULAS DE FONDO
   ======================================================== */
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;}
.particle{
  position:absolute;border-radius:50%;
  background:var(--active-color);opacity:0;
  animation:drift linear infinite;
  transition:background 1s;
}
@keyframes drift{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:0.4;}
  90%{opacity:0.1;}
  100%{transform:translateY(-20px) scale(1.2);opacity:0;}
}

/* ========================================================
   HEADER Y TABS
   ======================================================== */
header{
  position:relative;z-index:100;
  width:100%;padding:0 40px;height:72px;
  background:rgba(5,5,7,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 40px rgba(0,0,0,0.6);
  flex-shrink:0;
}

.logo{
  font-family:'Cinzel Decorative',serif;
  font-size:0.75rem;letter-spacing:4px;
  color:var(--muted);text-transform:uppercase;
}
.logo span{color:var(--active-color);transition:color 0.8s;}

nav{display:flex;gap:10px;align-items:center;}

.tab-btn{
  position:relative;background:transparent;
  border:1px solid var(--glass-border);color:var(--muted);
  padding:9px 24px;border-radius:40px;
  font-family:'DM Sans',sans-serif;font-size:0.78rem;
  font-weight:500;letter-spacing:2px;text-transform:uppercase;
  transition:all 0.4s;overflow:hidden;
}
.tab-btn::before{
  content:'';position:absolute;inset:0;
  background:var(--active-color);opacity:0;
  transition:opacity 0.4s;
}
.tab-btn:hover{color:#fff;border-color:rgba(255,255,255,0.2);}
.tab-btn.active{
  color:#000;border-color:var(--active-color);
  background:var(--active-color);
  box-shadow:0 0 30px var(--active-glow);
}
.tab-btn[data-project="palet"].active{background:var(--palet-gold);border-color:var(--palet-gold);box-shadow:0 0 30px rgba(212,175,55,0.3);}
.tab-btn[data-project="bambu"].active{background:var(--bambu-green);border-color:var(--bambu-green);box-shadow:0 0 30px rgba(61,186,114,0.3);}
.tab-btn[data-project="amaru"].active{background:var(--amaru-rose);border-color:var(--amaru-rose);box-shadow:0 0 30px rgba(232,115,138,0.3);}

.sena-badge{
  font-family:'Cinzel Decorative',serif;
  font-size:0.6rem;letter-spacing:3px;color:var(--muted);
  border:1px solid var(--glass-border);padding:5px 12px;border-radius:20px;
}

/* ========================================================
   ESCENARIO PRINCIPAL
   ======================================================== */
#stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:10;
  perspective:2200px;
  padding:20px;
  width:100%;
}

/* ========================================================
   LIBRO 3D — MOTOR PRINCIPAL
   ======================================================== */
.book-scene{
  display:none;
  position:relative;
  transform-style:preserve-3d;
  animation:bookFloat 7s ease-in-out infinite;
}
.book-scene.active{display:block;}
.book-scene.entering{animation:bookEnter 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards, bookFloat 7s ease-in-out infinite 0.8s;}

@keyframes bookEnter{
  from{opacity:0;transform:translateY(60px) rotateX(15deg) scale(0.9);}
  to{opacity:1;transform:translateY(0) rotateX(0) scale(1);}
}
@keyframes bookFloat{
  0%,100%{transform:translateY(0) rotateX(1.5deg);}
  50%{transform:translateY(-14px) rotateX(-1.5deg);}
}

/* Contenedor del libro abierto */
.book-open{
  display:flex;
  width:860px;height:540px;
  transform-style:preserve-3d;
  filter:drop-shadow(0 40px 80px rgba(0,0,0,0.8));
  position:relative;
}

/* Cada página */
.page{
  width:430px;height:540px;
  position:relative;
  transform-style:preserve-3d;
  transform-origin:right center; /* izquierda gira desde derecha */
  transition:transform 0.9s cubic-bezier(0.645,0.045,0.355,1.000);
  background:var(--active-page);
  overflow:hidden;
}
.page.right-page{transform-origin:left center;}
.page.is-flipping{z-index:50;}

/* Lomo central */
.book-spine{
  width:18px;height:540px;
  background:linear-gradient(to bottom,#000 0%,#1a1a1a 50%,#000 100%);
  flex-shrink:0;
  box-shadow:inset -3px 0 8px rgba(0,0,0,0.6),inset 3px 0 8px rgba(0,0,0,0.6);
  position:relative;z-index:20;
}

/* Sombras internas del libro */
.page-left-shadow{
  position:absolute;right:0;top:0;width:60px;height:100%;
  background:linear-gradient(to right,transparent,rgba(0,0,0,0.4));
  z-index:5;pointer-events:none;
}
.page-right-shadow{
  position:absolute;left:0;top:0;width:60px;height:100%;
  background:linear-gradient(to left,transparent,rgba(0,0,0,0.4));
  z-index:5;pointer-events:none;
}

/* ========================================================
   INNER PAGE CONTENT
   ======================================================== */
.page-inner{
  position:relative;z-index:2;
  width:100%;height:100%;
  padding:40px 36px;
  display:flex;flex-direction:column;
  gap:14px;overflow:hidden;
}

.page-number{
  font-family:'Cormorant Garamond',serif;font-size:0.65rem;
  letter-spacing:3px;color:var(--active-color);
  text-transform:uppercase;opacity:0.7;
  transition:color 0.8s;
}

.page-eyebrow{
  font-family:'DM Sans',sans-serif;font-size:0.6rem;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--active-accent);opacity:0.8;
  transition:color 0.8s;
}

.page-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem;font-weight:300;line-height:1.2;
  color:var(--text);
}
.page-title em{
  font-style:italic;color:var(--active-accent);
  transition:color 0.8s;
}

.page-divider{
  width:40px;height:1px;background:var(--active-color);
  opacity:0.5;transition:background 0.8s;
}

.page-body{
  font-family:'Cormorant Garamond',serif;
  font-size:0.92rem;font-weight:300;line-height:1.7;
  color:rgba(232,228,220,0.8);flex:1;
}
.page-body strong{
  font-weight:600;color:var(--active-accent);
  transition:color 0.8s;
}

.page-stat{
  display:flex;gap:20px;margin-top:4px;
}
.stat-item{
  flex:1;border:1px solid var(--glass-border);border-radius:8px;
  padding:12px;background:rgba(0,0,0,0.3);
}
.stat-num{
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:300;
  color:var(--active-color);transition:color 0.8s;
}
.stat-label{
  font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-top:2px;
}

.discover-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:1px solid var(--active-color);
  color:var(--active-color);padding:10px 18px;border-radius:4px;
  font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;
  font-family:'DM Sans',sans-serif;font-weight:500;
  margin-top:auto;align-self:flex-start;
  transition:all 0.3s;
  transition:background 0.3s,color 0.3s,border-color 0.8s;
}
.discover-btn:hover{background:var(--active-color);color:#000;}

/* Página de portada / cover */
.page-cover{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:40px 36px;overflow:hidden;
}
.cover-bg{
  position:absolute;inset:0;
  background:var(--active-page);
  transition:background 0.8s;
}
.cover-bg-pattern{
  position:absolute;inset:0;opacity:0.06;
  background-image:repeating-linear-gradient(
    45deg,var(--active-color) 0,var(--active-color) 1px,
    transparent 0,transparent 50%);
  background-size:20px 20px;
  transition:background-image 0.8s;
}
.cover-glow{
  position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,var(--active-glow) 0%,transparent 70%);
  top:-80px;right:-80px;
  transition:background 0.8s;
}
.cover-logo{
  position:relative;z-index:2;
  font-family:'Cinzel Decorative',serif;
  font-size:2.6rem;font-weight:700;
  color:var(--active-color);line-height:1;
  transition:color 0.8s;
  text-shadow:0 0 60px var(--active-glow);
}
.cover-sub{
  position:relative;z-index:2;
  font-family:'Cormorant Garamond',serif;
  font-size:0.75rem;font-weight:300;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--muted);margin-top:8px;
}
.cover-tagline{
  position:relative;z-index:2;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:1rem;
  color:rgba(232,228,220,0.6);
  margin-top:16px;border-top:1px solid var(--glass-border);
  padding-top:16px;
}
.cover-year{
  position:absolute;top:36px;right:36px;z-index:2;
  font-family:'Cinzel Decorative',serif;font-size:0.6rem;
  letter-spacing:4px;color:var(--muted);
}

/* Pill tags */
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.pill{
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--glass-border);
  font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--active-accent);
  background:rgba(0,0,0,0.3);
  transition:color 0.8s,border-color 0.8s;
}

/* Flip arrows */
#nav-prev, #nav-next{
  position:absolute;top:50%;
  background:rgba(5,5,7,0.8);border:1px solid var(--glass-border);
  color:var(--muted);width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;z-index:200;
  transition:all 0.3s;transform:translateY(-50%);
}
#nav-prev{left:-70px;}
#nav-next{right:-70px;}
#nav-prev:hover,#nav-next:hover{
  border-color:var(--active-color);color:var(--active-color);
  box-shadow:0 0 20px var(--active-glow);
}
#nav-prev.hidden,#nav-next.hidden{opacity:0.2;pointer-events:none;}

/* Page indicator */
#page-indicator{
  position:absolute;bottom:-44px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;align-items:center;
}
.page-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--glass-border);
  transition:background 0.3s,transform 0.3s;
}
.page-dot.active{background:var(--active-color);transform:scale(1.4);}

/* Drag hint */
.drag-hint{
  position:absolute;bottom:8px;right:12px;
  font-size:0.55rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
  opacity:0.5;z-index:10;pointer-events:none;
}

/* ========================================================
   MODAL GLASSMORPHISM
   ======================================================== */
#modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
  animation:fadeIn 0.3s ease;
}
#modal-overlay.open{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

#modal-box{
  width:min(700px,92vw);max-height:85vh;
  background:rgba(10,10,14,0.9);
  border:1px solid var(--active-color);
  border-radius:16px;padding:48px;
  box-shadow:0 0 80px var(--active-glow),0 40px 80px rgba(0,0,0,0.5);
  overflow-y:auto;position:relative;
  animation:modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  transition:border-color 0.8s,box-shadow 0.8s;
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(30px) scale(0.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

#modal-close{
  position:absolute;top:20px;right:20px;
  background:transparent;border:1px solid var(--glass-border);
  color:var(--muted);width:36px;height:36px;border-radius:50%;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;
}
#modal-close:hover{border-color:var(--active-color);color:var(--active-color);}

.modal-eyebrow{
  font-size:0.6rem;letter-spacing:4px;text-transform:uppercase;
  color:var(--active-color);margin-bottom:12px;
  transition:color 0.8s;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;
  line-height:1.2;margin-bottom:24px;
}
.modal-body{
  font-family:'Cormorant Garamond',serif;font-size:1rem;
  font-weight:300;line-height:1.8;color:rgba(232,228,220,0.8);
}
.modal-body h4{
  font-family:'DM Sans',sans-serif;font-size:0.7rem;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--active-accent);margin:20px 0 8px;
  transition:color 0.8s;
}
.modal-body ul{padding-left:18px;}
.modal-body li{margin-bottom:6px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;}
.modal-card{
  background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);
  border-radius:10px;padding:18px;
}
.modal-card .num{
  font-family:'Cormorant Garamond',serif;font-size:2rem;
  color:var(--active-color);transition:color 0.8s;
}
.modal-card .lbl{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

/* ========================================================
   FOOTER
   ======================================================== */
footer{
  position:relative;z-index:100;height:36px;
  width:100%;display:flex;align-items:center;justify-content:center;
  border-top:1px solid var(--glass-border);
  background:rgba(5,5,7,0.8);flex-shrink:0;
}
footer p{font-size:0.55rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}

/* ========================================================
   RESPONSIVE
   ======================================================== */
@media(max-width:960px){
  .book-open{width:680px;height:440px;}
  .page{width:340px;height:440px;}
  .book-spine{height:440px;}
  .cover-logo{font-size:2rem;}
  .page-title{font-size:1.4rem;}
  #nav-prev{left:-50px;}
  #nav-next{right:-50px;}
}
@media(max-width:720px){
  .book-open{width:340px;height:460px;}
  .page{width:340px;height:460px;}
  .page:first-child{display:none;}
  .book-spine{display:none;}
  #nav-prev{left:-40px;}
  #nav-next{right:-40px;}
}
</style>
</head>
<body>

<!-- CURSOR -->
<div id="c-dot"></div>
<div id="c-ring"></div>
<div id="ambient"></div>

<!-- PARTÍCULAS -->
<div id="particles"></div>

<!-- HEADER -->
<header>
  <div class="logo">Feria Innovación · <span id="logo-name">PaletDo27</span></div>
  <nav>
    <button class="tab-btn active" data-project="palet">PaletDo27</button>
    <button class="tab-btn" data-project="bambu">Bambugraft</button>
    <button class="tab-btn" data-project="amaru">Amarú Cosmetics</button>
  </nav>
  <div class="sena-badge">SENA · 2026</div>
</header>

<!-- STAGE -->
<div id="stage">

  <!-- ====== LIBRO: PALETDO27 ====== -->
  <div class="book-scene active entering" id="book-palet">
    <div class="book-open">
      <!-- Página izquierda -->
      <div class="page left-page" id="palet-left">
        <div class="page-left-shadow"></div>
        <div class="page-inner" id="palet-left-inner">
          <!-- contenido dinámico -->
        </div>
        <div class="drag-hint">⟵ arrastrar</div>
      </div>
      <div class="book-spine"></div>
      <!-- Página derecha -->
      <div class="page right-page" id="palet-right">
        <div class="page-right-shadow"></div>
        <div class="page-inner" id="palet-right-inner"></div>
        <div class="drag-hint">arrastrar ⟶</div>
      </div>
    </div>
    <!-- Nav -->
    <button id="nav-prev" class="hidden">&#8592;</button>
    <button id="nav-next">&#8594;</button>
    <div id="page-indicator"></div>
  </div>

  <!-- ====== LIBRO: BAMBUGRAFT ====== -->
  <div class="book-scene" id="book-bambu">
    <div class="book-open">
      <div class="page left-page" id="bambu-left">
        <div class="page-left-shadow"></div>
        <div class="page-inner" id="bambu-left-inner"></div>
        <div class="drag-hint">⟵ arrastrar</div>
      </div>
      <div class="book-spine"></div>
      <div class="page right-page" id="bambu-right">
        <div class="page-right-shadow"></div>
        <div class="page-inner" id="bambu-right-inner"></div>
        <div class="drag-hint">arrastrar ⟶</div>
      </div>
    </div>
    <button class="nav-p hidden">&#8592;</button>
    <button class="nav-n">&#8594;</button>
    <div class="pg-ind"></div>
  </div>

  <!-- ====== LIBRO: AMARÚ ====== -->
  <div class="book-scene" id="book-amaru">
    <div class="book-open">
      <div class="page left-page" id="amaru-left">
        <div class="page-left-shadow"></div>
        <div class="page-inner" id="amaru-left-inner"></div>
        <div class="drag-hint">⟵ arrastrar</div>
      </div>
      <div class="book-spine"></div>
      <div class="page right-page" id="amaru-right">
        <div class="page-right-shadow"></div>
        <div class="page-inner" id="amaru-right-inner"></div>
        <div class="drag-hint">arrastrar ⟶</div>
      </div>
    </div>
    <button class="nav-p hidden">&#8592;</button>
    <button class="nav-n">&#8594;</button>
    <div class="pg-ind"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close">✕</button>
    <div class="modal-eyebrow" id="modal-eyebrow"></div>
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- FOOTER -->
<footer><p>Instituto Luis Carlos Galán Sarmiento · SENA · Feria de Innovación 2026</p></footer>

<script>
/* ========================================================
   DATA: PÁGINAS POR PROYECTO
   ======================================================== */
const PROJECTS = {
  palet: {
    name: 'PaletDo27',
    color: '#D4AF37',
    colorDark: '#1a1508',
    colorAccent: '#f5d76e',
    glow: 'rgba(212,175,55,0.18)',
    pages: [
      // spread 0: portada + intro
      {
        left: {
          type: 'cover',
          logo: 'PaletDo27',
          sub: 'Coctelería Sin Alcohol',
          tagline: '"La elegancia no tiene por qué costar tu lucidez."',
          year: 'Est. 2026'
        },
        right: {

/* ========================================================
   STATE
   ======================================================== */
let currentProject = 'palet';
let currentSpreads = { palet: 0, bambu: 0, amaru: 0 };

/* ========================================================
   CURSOR MAGNÉTICO
   ======================================================== */
const dot = document.getElementById('c-dot');
const ring = document.getElementById('c-ring');
const ambient = document.getElementById('ambient');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  dot.style.left = mx+'px'; dot.style.top = my+'px';
  ambient.style.left = mx+'px'; ambient.style.top = my+'px';
});

// Suave sigo del ring
setInterval(() => {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
}, 16);

document.querySelectorAll('button, .discover-btn').forEach(el => {
  el.addEventListener('mouseenter', () => {
    ring.style.width = '54px'; ring.style.height = '54px';
    ring.style.borderColor = 'var(--active-color)';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width = '36px'; ring.style.height = '36px';
    ring.style.borderColor = 'rgba(255,255,255,0.3)';
  });
});

/* ========================================================
   PARTÍCULAS
   ======================================================== */
function spawnParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(p);
  }
}

/* ========================================================
   RENDER HELPERS
   ======================================================== */
function renderLeft(data, el) {
  if (data.type === 'cover') {
    el.innerHTML = `
      <div class="page-cover">
        <div class="cover-bg"></div>
        <div class="cover-bg-pattern"></div>
        <div class="cover-glow"></div>
        <div class="cover-year">${data.year}</div>
        <div class="cover-logo">${data.logo}</div>
        <div class="cover-sub">${data.sub}</div>
        <div class="cover-tagline">${data.tagline}</div>
      </div>`;
  } else {
    renderRight(data, el);
  }
}

function renderRight(data, el) {
  let statsHTML = '';
  if (data.stats) {
    statsHTML = `<div class="page-stat">${data.stats.map(s=>`
      <div class="stat-item">
        <div class="stat-num">${s.num}</div>
        <div class="stat-label">${s.lbl}</div>
      </div>`).join('')}</div>`;
  }
  let pillsHTML = '';
  if (data.pills) {
    pillsHTML = `<div class="pill-row">${data.pills.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`;
  }
  let btnHTML = data.modal ? `<button class="discover-btn" data-modal="${data.modal}">[ + DESCUBRIR MÁS ]</button>` : '';

  el.innerHTML = `
    <div class="page-eyebrow">${data.eyebrow||''}</div>
    <h2 class="page-title">${data.title||''}</h2>
    <div class="page-divider"></div>
    <div class="page-body">${data.body||''}</div>
    ${pillsHTML}
    ${statsHTML}
    ${btnHTML}
  `;

  // Bind modal buttons
  el.querySelectorAll('.discover-btn').forEach(btn => {
    btn.addEventListener('click', () => openModal(btn.dataset.modal));
  });
}

function renderSpread(project, spreadIndex) {
  const proj = PROJECTS[project];
  const spread = proj.pages[spreadIndex];
  if (!spread) return;

  const leftEl = document.getElementById(`${project}-left-inner`) ||
                 document.querySelector(`#book-${project} .page.left-page .page-inner`);
  const rightEl = document.getElementById(`${project}-right-inner`) ||
                  document.querySelector(`#book-${project} .page.right-page .page-inner`);

  if (leftEl) renderLeft(spread.left, leftEl);
  if (rightEl) renderRight(spread.right, rightEl);

  updateIndicators(project, spreadIndex);
}

function updateIndicators(project, current) {
  const proj = PROJECTS[project];
  const total = proj.pages.length;
  const book = document.getElementById(`book-${project}`);
  const ind = book.querySelector('#page-indicator, .pg-ind');
  if (!ind) return;
  ind.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'page-dot' + (i === current ? ' active' : '');
    ind.appendChild(d);
  }

  // prev/next
  const prev = book.querySelector('#nav-prev, .nav-p');
  const next = book.querySelector('#nav-next, .nav-n');
  if (prev) prev.classList.toggle('hidden', current === 0);
  if (next) next.classList.toggle('hidden', current === total - 1);
}

/* ========================================================
   FLIP ANIMATION
   ======================================================== */
function flipPages(project, direction) {
  const book = document.getElementById(`book-${project}`);
  const leftPage = book.querySelector('.page.left-page');
  const rightPage = book.querySelector('.page.right-page');

  // Animate flip
  const flipEl = direction > 0 ? rightPage : leftPage;
  flipEl.classList.add('is-flipping');

  const deg = direction > 0 ? -20 : 20;
  flipEl.style.transition = 'transform 0.35s ease-in';
  flipEl.style.transform = `rotateY(${deg}deg)`;

  setTimeout(() => {
    currentSpreads[project] += direction;
    renderSpread(project, currentSpreads[project]);
    flipEl.style.transition = 'transform 0.35s ease-out';
    flipEl.style.transform = 'rotateY(0deg)';
    setTimeout(() => {
      flipEl.classList.remove('is-flipping');
      flipEl.style.transform = '';
      flipEl.style.transition = '';
    }, 360);
  }, 360);
}

/* ========================================================
   DRAG TO FLIP
   ======================================================== */
function initDrag(project) {
  const book = document.getElementById(`book-${project}`);
  if (!book) return;
  let startX = 0, dragging = false;

  book.addEventListener('mousedown', e => {
    startX = e.clientX;
    dragging = true;
  });
  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    const diff = e.clientX - startX;
    const proj = PROJECTS[project];
    if (Math.abs(diff) > 60) {
      const dir = diff < 0 ? 1 : -1;
      const newSpread = currentSpreads[project] + dir;
      if (newSpread >= 0 && newSpread < proj.pages.length) {
        flipPages(project, dir);
      }
    }
  });

  // Touch
  book.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
  book.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - startX;
    const proj = PROJECTS[project];
    if (Math.abs(diff) > 50) {
      const dir = diff < 0 ? 1 : -1;
      const newSpread = currentSpreads[project] + dir;
      if (newSpread >= 0 && newSpread < proj.pages.length) {
        flipPages(project, dir);
      }
    }
  });

  // Nav buttons
  const prev = book.querySelector('#nav-prev, .nav-p');
  const next = book.querySelector('#nav-next, .nav-n');
  if (prev) prev.addEventListener('click', () => {
    if (currentSpreads[project] > 0) flipPages(project, -1);
  });
  if (next) next.addEventListener('click', () => {
    if (currentSpreads[project] < PROJECTS[project].pages.length - 1) flipPages(project, 1);
  });
}

/* ========================================================
   PROJECT SWITCH
   ======================================================== */
function setProject(project) {
  const proj = PROJECTS[project];
  currentProject = project;

  // CSS vars
  document.documentElement.style.setProperty('--active-color', proj.color);
  document.documentElement.style.setProperty('--active-glow', proj.glow);
  document.documentElement.style.setProperty('--active-page', proj.colorDark);
  document.documentElement.style.setProperty('--active-accent', proj.colorAccent);

  // Logo
  document.getElementById('logo-name').textContent = proj.name;

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    if (b.dataset.project === project) b.classList.add('active');
  });

  // Books
  document.querySelectorAll('.book-scene').forEach(b => {
    b.classList.remove('active', 'entering');
  });
  const book = document.getElementById(`book-${project}`);
  book.classList.add('active');
  requestAnimationFrame(() => book.classList.add('entering'));

  spawnParticles();

  // Render current spread
  renderSpread(project, currentSpreads[project]);
}

/* ========================================================
   MODAL
   ======================================================== */
function openModal(key) {
  const m = MODALS[key];
  if (!m) return;
  document.getElementById('modal-eyebrow').textContent = m.eyebrow;
  document.getElementById('modal-title').textContent = m.title;
  document.getElementById('modal-body').innerHTML = m.body;
  document.getElementById('modal-box').style.borderColor = 'var(--active-color)';
  document.getElementById('modal-box').style.boxShadow = '0 0 80px var(--active-glow), 0 40px 80px rgba(0,0,0,0.5)';
  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});

/* ========================================================
   TAB EVENTS
   ======================================================== */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => setProject(btn.dataset.project));
});

/* ========================================================
   INIT
   ======================================================== */
// Init all books
['palet','bambu','amaru'].forEach(p => {
  initDrag(p);
  renderSpread(p, 0);
});

setProject('palet');
</script>
